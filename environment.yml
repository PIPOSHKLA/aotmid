name: aot-stock-network
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  # Core
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pyyaml>=6.0
  # Data fetching
  - requests>=2.28.0
  - beautifulsoup4>=4.12.0
  - lxml>=4.9.0
  - openpyxl>=3.1.0
  - python-dotenv>=1.0.0
  # Analysis
  - networkx>=3.0
  - statsmodels>=0.14.0
  - scikit-learn>=1.2.0
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.14.0
  # Dashboard
  - streamlit>=1.25.0
  # Report
  - python-docx>=1.0.0
  # Utilities
  - joblib>=1.2.0
  # Testing
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  - black>=23.0.0
  - ruff>=0.1.0
  - mypy>=1.5.0
  # Pip-only packages
  - pip
  - pip:
    - xgboost>=1.7.0
    - lightgbm>=4.0.0
    - catboost>=1.2.0
    - prophet>=1.1.0
    - tensorflow>=2.13.0
    - shap>=0.42.0
    - loguru>=0.7.0
